<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f0b429">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MITV">
<title>MITV Network — Login</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://i.ibb.co/Xxpt0B54/IMG-20260415-223746-removebg-preview.png">
<link rel="stylesheet" href="css/shared.css">
<style>
.login-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.4rem;position:relative;z-index:1}

/* Logo */
.logo-block{text-align:center;margin-bottom:1.9rem;animation:fadeUp .7s ease both}
.logo-ring{width:100px;height:100px;margin:0 auto .9rem;position:relative;animation:logoFloat 4s ease-in-out infinite}
.logo-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1.5px solid rgba(240,180,41,.25);animation:ringPulse 3s ease-in-out infinite}
.logo-ring::after{content:'';position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(240,180,41,.1);animation:ringPulse 3s ease-in-out infinite .5s}
.logo-ring img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 28px rgba(240,180,41,.72));animation:logoSpin 10s ease-in-out infinite;position:relative;z-index:1}
.logo-title{font-family:var(--fh);font-size:2rem;font-weight:900;letter-spacing:5px;background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold),var(--gold2),var(--gold3));background-size:250%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3.5s linear infinite}
.logo-sub{color:var(--text2);font-size:.68rem;letter-spacing:3px;text-transform:uppercase;margin-top:.3rem}
.logo-ver{display:inline-flex;align-items:center;gap:.35rem;background:rgba(240,180,41,.1);border:1px solid var(--border2);border-radius:20px;padding:.2rem .7rem;font-size:.62rem;color:var(--gold);font-family:var(--fh);letter-spacing:1px;margin-top:.55rem}

@keyframes logoFloat {0%,100%{transform:translateY(0) rotateX(0)}50%{transform:translateY(-10px) rotateX(3deg)}}
@keyframes logoSpin  {0%,100%{transform:rotateY(0) scale(1)}50%{transform:rotateY(18deg) scale(1.05)}}
@keyframes ringPulse {0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
@keyframes shimmer   {0%{background-position:0%}100%{background-position:250%}}

/* Card */
.auth-card{width:100%;max-width:420px;animation:scaleIn .5s .1s var(--spring) both}

/* Tabs */
.tabs{display:flex;background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:1.3rem;gap:2px}
.tab{flex:1;padding:.65rem;border:none;border-radius:9px;font-family:var(--fh);font-size:.68rem;letter-spacing:1.5px;cursor:pointer;transition:var(--t);color:var(--text2);background:transparent}
.tab.on{background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));color:var(--dark);font-weight:800;box-shadow:0 2px 12px rgba(240,180,41,.35)}

/* Field */
.field{position:relative;margin-bottom:1.05rem}
.field-lbl{font-family:var(--fh);font-size:.64rem;letter-spacing:2px;color:var(--text2);display:block;margin-bottom:.38rem;text-transform:uppercase}
.field-ico{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:.95rem;color:var(--text2);pointer-events:none;transition:color .2s,transform .2s}
.field-inp{padding-left:2.75rem!important}
.field:focus-within .field-ico{color:var(--gold);transform:translateY(-50%) scale(1.1)}

/* Error/Success */
.err-box{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.28);border-radius:var(--r2);padding:.68rem 1rem;color:var(--red);font-size:.81rem;margin-bottom:.85rem;display:none}
.err-box.show{display:block;animation:shake .4s ease}
.ok-box{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.26);border-radius:var(--r2);padding:.8rem 1rem;color:var(--green);font-size:.84rem;margin-bottom:.85rem;display:none;line-height:1.65}
.ok-box.show{display:block;animation:fadeIn .4s ease}
.info-box{background:rgba(240,180,41,.07);border:1px solid var(--border2);border-radius:var(--r2);padding:.8rem 1rem;margin-bottom:1.15rem;font-size:.81rem;color:var(--text2);line-height:1.65}

/* Footer */
.login-foot{margin-top:1.7rem;text-align:center;color:var(--text2);font-size:.7rem;letter-spacing:1px;animation:fadeUp .6s .3s ease both}
.login-foot .g{color:var(--gold)}
.admin-lnk{display:block;text-align:center;margin-top:.9rem;color:var(--text3);font-size:.74rem;text-decoration:none;transition:color .2s}
.admin-lnk:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="bg-canvas"><div class="particles"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<!-- Loader -->
<div class="loader" id="loader">
  <img src="https://i.ibb.co/Xxpt0B54/IMG-20260415-223746-removebg-preview.png" class="loader-logo" alt="MITV">
  <div class="loader-ring"></div>
  <div class="loader-txt">MITV Network Loading...</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- Sound -->
<button id="sndBtn" onclick="toggleSound()" style="position:fixed;top:1rem;right:1rem;z-index:99;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:.38rem .7rem;color:var(--text);cursor:pointer;font-size:.95rem;backdrop-filter:blur(12px);transition:var(--t)">🔊</button>

<!-- PWA Banner -->
<div class="pwa-bar" id="pwaBanner" style="bottom:1.4rem">
  <img src="https://i.ibb.co/Xxpt0B54/IMG-20260415-223746-removebg-preview.png" alt="MITV">
  <div class="pwa-bar-text"><div class="pwa-bar-title">MITV App Install Karein</div><div class="pwa-bar-sub">Home screen pe add — fast access</div></div>
  <button class="btn btn-gold btn-sm" onclick="installPWA()">Install</button>
</div>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-ring"><img src="https://i.ibb.co/Xxpt0B54/IMG-20260415-223746-removebg-preview.png" alt="MITV"></div>
    <div class="logo-title">MITV NETWORK</div>
    <div class="logo-sub">Reseller Management Portal</div>
    <div class="logo-ver">✨ v4.0 Ultra</div>
  </div>

  <div class="auth-card card" style="padding:1.8rem 2rem">
    <div class="gold-bar"></div>
    <div class="tabs">
      <button class="tab on" id="t1" onclick="switchTab('login')">🔐 Login</button>
      <button class="tab" id="t2" onclick="switchTab('reg')">📝 Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="err-box" id="loginErr"></div>
      <div class="field">
        <label class="field-lbl">Phone Number</label>
        <span class="field-ico">📞</span>
        <input type="tel" class="form-input field-inp" id="lPhone" placeholder="03XX-XXXXXXX" autocomplete="tel">
      </div>
      <div class="field">
        <label class="field-lbl">Password</label>
        <span class="field-ico">🔑</span>
        <input type="password" class="form-input field-inp" id="lPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-gold btn-full" id="loginBtn" onclick="doLogin()" style="margin-top:.35rem;padding:.9rem;font-size:.93rem;letter-spacing:2px">⚡ LOGIN KAREIN</button>
      <a href="admin.html" class="admin-lnk">👑 Admin Portal →</a>
    </div>

    <!-- REGISTER -->
    <div id="regForm" style="display:none">
      <div class="info-box">ℹ️ Request admin (Muaaz) ke paas jayegi. Approve hone ke baad login kar sakte ho.</div>
      <div class="err-box" id="regErr"></div>
      <div class="ok-box" id="regOk"></div>
      <div class="field"><label class="field-lbl">Pura Naam</label><span class="field-ico">👤</span><input type="text" class="form-input field-inp" id="rName" placeholder="Muhammad Ali"></div>
      <div class="field"><label class="field-lbl">WhatsApp Number</label><span class="field-ico">📞</span><input type="tel" class="form-input field-inp" id="rPhone" placeholder="03XX-XXXXXXX"></div>
      <div class="field"><label class="field-lbl">City</label><span class="field-ico">📍</span><input type="text" class="form-input field-inp" id="rCity" placeholder="Lahore, Karachi..."></div>
      <div class="field"><label class="field-lbl">Password</label><span class="field-ico">🔒</span><input type="password" class="form-input field-inp" id="rPass" placeholder="Min 4 characters"></div>
      <div class="field"><label class="field-lbl">MITV Se Kaise Suna?</label><span class="field-ico">💬</span><input type="text" class="form-input field-inp" id="rRef" placeholder="Dost, social media..."></div>
      <button class="btn btn-gold btn-full" id="regBtn" onclick="doReg()" style="margin-top:.35rem;padding:.9rem;letter-spacing:1px">📤 Request Bhejo</button>
    </div>
  </div>

  <div class="login-foot">
    🏢 <span class="g">MUSLIM ISLAM</span> &nbsp;|&nbsp; 👑 <span class="g">Muaaz Iqbal</span> (Kasur, Punjab)
  </div>
</div>

<div id="toastBox"></div>
<script src="js/sounds.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
import { firebaseConfig, showToast, regSW } from './js/firebase-config.js';

const app=initializeApp(firebaseConfig), db=getDatabase(app);
regSW();

setTimeout(()=>document.getElementById('loader').classList.add('hide'),1800);

// Session check
const s=localStorage.getItem('mitv_session');
if(s){try{const p=JSON.parse(s);if(p?.id){sessionStorage.setItem('mitv_reseller',s);location.href=p.role==='admin'?'admin.html':'dashboard.html'}}catch{localStorage.removeItem('mitv_session')}}

// Tab switch
window.switchTab=t=>{
  playSound('nav');
  const isL=t==='login';
  document.getElementById('loginForm').style.display=isL?'block':'none';
  document.getElementById('regForm').style.display=isL?'none':'block';
  document.getElementById('t1').classList.toggle('on',isL);
  document.getElementById('t2').classList.toggle('on',!isL);
};

// Enter keys
['lPhone','lPass'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()}));
['rName','rPhone','rCity','rPass','rRef'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doReg()}));

// Login
window.doLogin=async()=>{
  const phone=document.getElementById('lPhone').value.trim();
  const pass=document.getElementById('lPass').value.trim();
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  err.classList.remove('show');
  if(!phone||!pass){err.textContent='⚠️ Phone aur password zaroori hain.';err.classList.add('show');playSound('error');return}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Checking...';
  try{
    const snap=await get(ref(db,'resellers'));
    let found=null;
    if(snap.exists())for(const[id,d]of Object.entries(snap.val()))
      if(d.number===phone&&d.password===pass&&d.active!==false){found={...d,id,role:'reseller'};break}
    if(found){
      localStorage.setItem('mitv_session',JSON.stringify(found));
      sessionStorage.setItem('mitv_reseller',JSON.stringify(found));
      playSound('success');showToast('✅ Welcome, '+found.name+'!','success');
      setTimeout(()=>location.href='dashboard.html',800);
    }else throw new Error('invalid');
  }catch{
    playSound('error');
    err.textContent='❌ Galat phone number ya password.';err.classList.add('show');
    btn.disabled=false;btn.innerHTML='⚡ LOGIN KAREIN';
  }
};

// Register
window.doReg=async()=>{
  const name=document.getElementById('rName').value.trim();
  const phone=document.getElementById('rPhone').value.trim();
  const city=document.getElementById('rCity').value.trim();
  const pass=document.getElementById('rPass').value.trim();
  const ref2=document.getElementById('rRef').value.trim();
  const err=document.getElementById('regErr'),ok=document.getElementById('regOk'),btn=document.getElementById('regBtn');
  err.classList.remove('show');ok.classList.remove('show');
  if(!name||!phone||!pass){err.textContent='⚠️ Naam, phone aur password zaroori.';err.classList.add('show');playSound('error');return}
  if(pass.length<4){err.textContent='⚠️ Password min 4 characters.';err.classList.add('show');playSound('error');return}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Bhej raha hai...';
  try{
    await push(ref(db,'reseller_requests'),{name,phone,city,password:pass,reference:ref2,status:'pending',requested_at:Date.now()});
    playSound('deploy');
    ok.innerHTML='✅ <strong>Request bhaij di!</strong><br>Muaaz approve karega aur login details bhejega.<br>📞 Kasur, Punjab';
    ok.classList.add('show');
    ['rName','rPhone','rCity','rPass','rRef'].forEach(id=>document.getElementById(id).value='');
  }catch(e){
    err.textContent='❌ Error: '+e.message;err.classList.add('show');playSound('error');
  }
  btn.disabled=false;btn.innerHTML='📤 Request Bhejo';
};
</script>
</body>
</html>
