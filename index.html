function toast(msg,type,ms){const c=document.getElementById('toasts'),t=document.createElement('div');t.className='toast '+(type||'info');t.innerHTML='<span>'+({ok:'✅',err:'❌',info:'ℹ️'}[type]||'•')+'</span><span>'+msg+'</span>';c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),260)},ms||3000)}
window.sw=t=>{const isL=t==='l';document.getElementById('fL').style.display=isL?'block':'none';document.getElementById('fR').style.display=isL?'none':'block';document.getElementById('tL').classList.toggle('on',isL);document.getElementById('tR').classList.toggle('on',!isL)};
document.addEventListener('DOMContentLoaded',()=>{['lP','lW'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin()})})});
window.doLogin=async()=>{
  const ph=document.getElementById('lP').value.trim(),pw=document.getElementById('lW').value.trim();
  const eEl=document.getElementById('lE'),btn=document.getElementById('lBtn');
  eEl.classList.remove('on');
  if(!ph||!pw){eEl.textContent='⚠️ Phone aur password zaroori.';eEl.classList.add('on');ps('err');return}
  btn.disabled=true;btn.innerHTML='<span style="width:13px;height:13px;border:2px solid rgba(0,0,0,0.4);border-top-color:#03060d;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px"></span>Verify...';
  try{
    const snap=await get(ref(db,'resellers'));if(!snap.exists())throw new Error('No data');
    let found=null;
    snap.forEach(child=>{const d=child.val();if((d.number===ph||d.phone===ph)&&d.password===pw&&d.active!==false)found={...d,id:child.key,role:'reseller'}});
    if(found){localStorage.setItem('mitv_s',JSON.stringify(found));sessionStorage.setItem('ms',JSON.stringify(found));ps('ok');toast('✅ Welcome, '+found.name+'!','ok');setTimeout(()=>location.href='dashboard.html',650)}
    else throw new Error('invalid');
  }catch(e){ps('err');eEl.textContent='❌ Galat phone ya password.';eEl.classList.add('on');btn.disabled=false;btn.innerHTML='LOGIN KAREIN'}
};
window.doGoogleLogin=async()=>{
  try{const provider=new GoogleAuthProvider();const result=await signInWithPopup(auth,provider);const user=result.user;
    const ADMIN_EMAIL='muaaziqbal@gmail.com';
    if(user.email===ADMIN_EMAIL){const sess={id:'ADMIN',name:'Muaaz Iqbal',role:'admin',email:user.email,photo:user.photoURL};localStorage.setItem('mitv_s',JSON.stringify(sess));sessionStorage.setItem('ms',JSON.stringify(sess));ps('ok');toast('✅ Welcome Admin Muaaz!','ok');setTimeout(()=>location.href='admin.html',650)}
    else{ps('err');toast('❌ Sirf Admin email allowed hai.','err')}
  }catch(e){ps('err');toast('❌ Google login failed.','err')}
};
window.doReg=async()=>{
  const nm=document.getElementById('rN').value.trim(),ph=document.getElementById('rP').value.trim(),ct=document.getElementById('rC').value.trim(),em=document.getElementById('rEM').value.trim(),pw=document.getElementById('rW').value.trim();
  const eEl=document.getElementById('rE'),oEl=document.getElementById('rO'),btn=document.getElementById('rBtn');
  eEl.classList.remove('on');oEl.classList.remove('on');
  if(!nm||!ph||!pw){eEl.textContent='⚠️ Naam, phone aur password zaroori.';eEl.classList.add('on');ps('err');return}
  if(pw.length<4){eEl.textContent='⚠️ Password 4+ characters.';eEl.classList.add('on');ps('err');return}
  btn.disabled=true;btn.innerHTML='Bhej raha hai...';
  try{await push(ref(db,'reseller_requests'),{name:nm,phone:ph,email:em||'',city:ct,password:pw,status:'pending',requested_at:Date.now()});ps('ok');oEl.innerHTML='✅ <strong>Request bhaij di!</strong><br>Admin approve karega.';oEl.classList.add('on');['rN','rP','rC','rEM','rW'].forEach(id=>document.getElementById(id).value='')}
  catch(e){ps('err');eEl.textContent='❌ Error: '+e.message;eEl.classList.add('on')}
  btn.disabled=false;btn.innerHTML='REQUEST BHEJO';
};
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
