<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITV Network — Reseller Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0b429">
<link rel="apple-touch-icon" href="https://i.ibb.co/Xxpt0B54/IMG-20260415-223746-removebg-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0b429;
    --gold2: #ffd166;
    --dark: #080c14;
    --dark2: #0d1420;
    --dark3: #111928;
    --panel: #0f1923;
    --panel2: #162030;
    --border: rgba(240,180,41,0.18);
    --border2: rgba(240,180,41,0.35);
    --text: #e8edf5;
    --text2: #8fa3b8;
    --green: #00e676;
    --red: #ff4d6d;
    --blue: #4fc3f7;
    --glow: 0 0 24px rgba(240,180,41,0.22);
    --glow2: 0 0 48px rgba(240,180,41,0.13);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPan 30s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes gridPan { 0%{background-position:0 0} 100%{background-position:48px 48px} }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(240,180,41,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 2.4rem;
    animation: fadeDown 0.7s ease both;
  }

  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--gold), #c88400);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1rem;
    box-shadow: var(--glow), 0 8px 32px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    top: -40%;
    left: -40%;
    width: 60%;
    height: 60%;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    filter: blur(12px);
  }

  .logo-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .logo-sub {
    color: var(--text2);
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .login-card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2.4rem 2.6rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), var(--glow2);
    animation: fadeUp 0.7s 0.15s ease both;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .card-sub { color: var(--text2); font-size: 0.82rem; margin-bottom: 1.8rem; }

  .field-label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 0.45rem;
    display: block;
  }
  .field-wrap { margin-bottom: 1.2rem; position: relative; }

  .field-input {
    width: 100%;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .field-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.12);
  }
  .field-icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: var(--text2);
    pointer-events: none;
  }

  .btn-login {
    width: 100%;
    padding: 0.95rem;
    background: linear-gradient(135deg, var(--gold), #c88400);
    border: none;
    border-radius: 10px;
    color: #080c14;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 0.5rem;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,180,41,0.35); }
  .btn-login:active { transform: translateY(0); }
  .btn-login .btn-shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.4s;
  }
  .btn-login:hover .btn-shine { left: 150%; }

  .error-msg {
    background: rgba(255,77,109,0.12);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--red);
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .error-msg.show { display: block; animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  .login-footer {
    text-align: center;
    margin-top: 2rem;
    color: var(--text2);
    font-size: 0.75rem;
    letter-spacing: 1px;
    animation: fadeUp 0.7s 0.3s ease both;
  }
  .login-footer span { color: var(--gold); }

  /* Loading overlay */
  .loader-overlay {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }
  .loader-overlay.hide { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 54px; height: 54px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1.2rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 3px;
    font-size: 0.85rem;
    color: var(--text2);
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text">MITV Network Loading...</div>
</div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">📡</div>
    <div class="logo-title">MITV Network</div>
    <div class="logo-sub">Reseller Management Portal v2.0</div>
  </div>

  <div class="login-card">
    <div class="card-title">🔐 Reseller Login</div>
    <div class="card-sub">Apna phone number aur password darj karein</div>

    <div class="error-msg" id="errorMsg">❌ Galat credentials. Check karein.</div>

    <div class="field-wrap">
      <label class="field-label">Phone Number</label>
      <span class="field-icon">📞</span>
      <input type="tel" class="field-input" id="phoneInput" placeholder="03XX-XXXXXXX" autocomplete="off">
    </div>

    <div class="field-wrap">
      <label class="field-label">Password</label>
      <span class="field-icon">🔑</span>
      <input type="password" class="field-input" id="passInput" placeholder="••••••••">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-shine"></span>
      Login Karein
    </button>
  </div>

  <div class="login-footer">
    🏢 Project of <span>MUSLIM ISLAM</span> &nbsp;|&nbsp; 👑 Founder: <span>Muaaz Iqbal</span> (Kasur)
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
   if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('MITV PWA Active!'))
        .catch(err => console.log('PWA Error', err));
    });
  }
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  // ── FIREBASE CONFIG — apna config yahan daalo ──────────────────────────
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "ramadan-2385b.firebaseapp.com",
    databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
    projectId: "ramadan-2385b",
    storageBucket: "ramadan-2385b.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Hide loader after init
  setTimeout(() => {
    document.getElementById('loaderOverlay').classList.add('hide');
  }, 1000);

  // Enter key support
  document.getElementById('passInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') doLogin();
  });

  window.doLogin = async function() {
    const phone = document.getElementById('phoneInput').value.trim();
    const pass  = document.getElementById('passInput').value.trim();
    const err   = document.getElementById('errorMsg');
    const btn   = document.getElementById('loginBtn');

    if(!phone || !pass) {
      err.textContent = '⚠️ Phone aur password dono zaroori hain.';
      err.classList.add('show');
      return;
    }

    btn.textContent = '⏳ Verify ho raha hai...';
    btn.disabled    = true;
    err.classList.remove('show');

    try {
      const snap = await get(ref(db, 'resellers'));
      if(!snap.exists()) throw new Error('No resellers found');

      const resellers = snap.val();
      let found = null;

      for(const [rid, data] of Object.entries(resellers)) {
        if(data.number === phone && data.password === pass && data.active !== false) {
          found = { ...data, id: rid };
          break;
        }
      }

      if(found) {
        sessionStorage.setItem('mitv_reseller', JSON.stringify(found));
        window.location.href = 'dashboard.html';
      } else {
        throw new Error('Invalid credentials');
      }
    } catch(e) {
      err.textContent = '❌ Galat credentials ya account disabled.';
      err.classList.add('show');
      btn.textContent = 'Login Karein';
      btn.disabled    = false;
    }
  };
</script>
</body>
</html>
